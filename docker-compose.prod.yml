# Production : secrets + DATABASE_URL via env_file (défaut `.env.production`).
# Autre fichier : export EVENTNOW_ENV_FILE=/chemin/vers/.env puis docker compose ...
#
# Déploiement : docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:15-alpine
    container_name: eventnow-postgres
    restart: unless-stopped
    env_file:
      - ${EVENTNOW_ENV_FILE:-.env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: eventnow-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    container_name: eventnow-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ${EVENTNOW_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: https://eventnow.fr
      CORS_ORIGINS: https://eventnow.fr,https://www.eventnow.fr
      GOOGLE_CALLBACK_URL: https://eventnow.fr/api/v1/auth/google/callback
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/api/v1/health',(r)=>{r.resume();process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
      args:
        VITE_API_URL: https://eventnow.fr
    container_name: eventnow-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
