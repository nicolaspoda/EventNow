name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci
      
      - name: Run linter
        working-directory: ./backend
        run: npm run lint

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: lint-backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci
      
      - name: Run tests
        working-directory: ./backend
        run: npm run test

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: test-backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci
      
      - name: Build application
        working-directory: ./backend
        run: npm run build

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Run linter
        working-directory: ./frontend
        run: npm run lint

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Build application
        working-directory: ./frontend
        run: npm run build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    environment: production
    steps:
      - name: Resolve SSH port
        id: ssh_port
        run: |
          if [ -n "${{ secrets.DEPLOY_PORT }}" ]; then
            echo "port=${{ secrets.DEPLOY_PORT }}" >> "$GITHUB_OUTPUT"
          else
            echo "port=22" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_APP_PATH: ${{ secrets.DEPLOY_APP_PATH }}
        run: |
          set -euo pipefail
          [ -n "$DEPLOY_HOST" ] || (echo "Missing secret: DEPLOY_HOST" && exit 1)
          [ -n "$DEPLOY_USER" ] || (echo "Missing secret: DEPLOY_USER" && exit 1)
          [ -n "$DEPLOY_SSH_KEY" ] || (echo "Missing secret: DEPLOY_SSH_KEY" && exit 1)
          [ -n "$DEPLOY_APP_PATH" ] || (echo "Missing secret: DEPLOY_APP_PATH" && exit 1)

      - name: Preflight SSH connectivity
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ steps.ssh_port.outputs.port }}
        run: |
          set -euo pipefail
          echo "Checking TCP connectivity to ${DEPLOY_HOST}:${DEPLOY_PORT}..."
          timeout 8 bash -c "cat < /dev/null > /dev/tcp/${DEPLOY_HOST}/${DEPLOY_PORT}" || {
            echo "Unable to reach ${DEPLOY_HOST}:${DEPLOY_PORT} from GitHub runner."
            echo "Check host/IP, SSH port, firewall, and provider security rules."
            exit 1
          }

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ steps.ssh_port.outputs.port }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 60s
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_APP_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            ENV_FILE="${{ secrets.DEPLOY_ENV_FILE }}"
            if [ -z "${ENV_FILE}" ]; then
              ENV_FILE=".env.production"
            fi
            if [ ! -f docker-compose.prod.yml ]; then
              echo "Missing docker-compose.prod.yml in ${PWD}"
              ls -la
              exit 1
            fi
            if [ ! -f "${ENV_FILE}" ]; then
              echo "Missing env file on server: ${PWD}/${ENV_FILE}"
              echo "Create it on the server or set DEPLOY_ENV_FILE secret."
              ls -la
              exit 1
            fi
            export EVENTNOW_ENV_FILE="${ENV_FILE}"
            docker compose -f docker-compose.prod.yml --env-file "${ENV_FILE}" up -d --build --remove-orphans