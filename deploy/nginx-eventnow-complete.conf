# Fichier prêt à déployer (un seul site-enabled, sans doublons).
# sudo tee /etc/nginx/sites-enabled/eventnow < deploy/nginx-eventnow-complete.conf
# sudo nginx -t && sudo systemctl reload nginx
#
# Si le preview Vite écoute en HTTPS sur 5173 : dans location /, utiliser
#   proxy_pass https://127.0.0.1:5173; + proxy_ssl_verify off;
# Sinon (recommandé, Dockerfile.prod actuel) : proxy_pass http://127.0.0.1:5173;

server {
    listen 80;
    server_name eventnow.fr www.eventnow.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name api.eventnow.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name eventnow.fr www.eventnow.fr;

    ssl_certificate /etc/letsencrypt/live/eventnow.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eventnow.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # CSP compatible Stripe (Payment Element + redirection de retour paiement).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.stripe.com https://q.stripe.com https://r.stripe.com https://m.stripe.com; frame-src 'self' https://js.stripe.com https://hooks.stripe.com https://*.stripe.com; child-src 'self' https://js.stripe.com https://hooks.stripe.com https://*.stripe.com; font-src 'self' data: https:; worker-src 'self' blob:; form-action 'self' https://js.stripe.com https://hooks.stripe.com https://*.stripe.com https://api.stripe.com; frame-ancestors 'self';" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=(), payment=(self)" always;

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name api.eventnow.fr;

    ssl_certificate /etc/letsencrypt/live/eventnow.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eventnow.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
