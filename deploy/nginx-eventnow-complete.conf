# Fichier prêt à déployer (un seul site-enabled, sans doublons).
# sudo tee /etc/nginx/sites-enabled/eventnow < deploy/nginx-eventnow-complete.conf
# sudo nginx -t && sudo systemctl reload nginx
#
# Si le preview Vite écoute en HTTPS sur 5173 : dans location /, utiliser
#   proxy_pass https://127.0.0.1:5173; + proxy_ssl_verify off;
# Sinon (recommandé, Dockerfile.prod actuel) : proxy_pass http://127.0.0.1:5173;

server {
    listen 80;
    server_name eventnow.fr www.eventnow.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name api.eventnow.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name eventnow.fr www.eventnow.fr;

    ssl_certificate /etc/letsencrypt/live/eventnow.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eventnow.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # CSP compatible Stripe (Payment Element + redirection de retour paiement).
    # CSP et Permissions-Policy sont gérés par le backend (Helmet)
    # afin d'éviter les doublons de headers entre Nginx et l'application.

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name api.eventnow.fr;

    ssl_certificate /etc/letsencrypt/live/eventnow.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eventnow.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
