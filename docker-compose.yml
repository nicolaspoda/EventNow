services:
  postgres:
    image: postgres:15-alpine
    container_name: eventnow-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: eventnow
      POSTGRES_PASSWORD: eventnow_dev_password
      POSTGRES_DB: eventnow_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: eventnow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: eventnow-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "5555:5555"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://eventnow:eventnow_dev_password@postgres:5432/eventnow_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      # Désactive le rate limiting (évite "too many requests" pendant les tests E2E)
      DISABLE_THROTTLE: "true"
      FRONTEND_URL: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      - postgres
      - redis
    command: sh -c "npm install && npx prisma generate && npx prisma migrate deploy && npm run start:dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: eventnow-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      # Le navigateur sur la machine hôte appelle l’API sur les ports exposés.
      VITE_API_URL: http://localhost:3000
      # Cible du proxy Vite (côté conteneur) si tu retires VITE_API_URL ou pour /api en same-origin.
      VITE_API_PROXY_TARGET: http://backend:3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  postgres_data:
  redis_data:
  backend_node_modules: