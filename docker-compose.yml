services:
  postgres:
    image: postgres:15-alpine
    container_name: eventnow-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: eventnow
      POSTGRES_PASSWORD: eventnow_dev_password
      POSTGRES_DB: eventnow_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: eventnow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: eventnow-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "5555:5555"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://eventnow:eventnow_dev_password@postgres:5432/eventnow_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    command: sh -c "npm install && npx prisma generate && npm run start:dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: eventnow-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  postgres_data:
  redis_data: